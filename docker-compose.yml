version: "3.9"

services:
  backend:
    build:
      context: ./Code/Backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - backend-data:/app/data
      - ./Log:/app/Log
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./Code/Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  backend-data:
